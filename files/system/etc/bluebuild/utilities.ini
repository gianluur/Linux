[utilities]
image=registry.fedoraproject.org/fedora-toolbox:latest
replace=true
 
sound=true
nvidia=true

additional_packages="gcc gcc-c++ make cmake git curl wget unzip tar xz fastfetch eza zoxide bat ripgrep fd-find fzf tldr btop gh jq yq"
init_hooks="dnf copr enable -y lihaohong/yazi && dnf install -y yazi"
exported_bins="/usr/bin/eza /usr/bin/bat /usr/bin/btop /usr/bin/fastfetch /usr/bin/fzf /usr/bin/fd /usr/bin/rg /usr/bin/tldr /usr/bin/zoxide /usr/bin/mise"

[dev]
include=utilities a
exported_bins=""
init_hooks="curl https://mise.run | sh"