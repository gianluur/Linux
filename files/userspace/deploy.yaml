---
- name: Deploy Unified Dotfiles Environment
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Resolves the '~' to your actual home directory path dynamically
    home_dir: "{{ lookup('env', 'HOME') }}"

  # Ingest the unified database
  vars_files:
    - matrix.yaml

  tasks:
    # ==========================================
    # PHASE 1: DIRECTORY PREPARATION
    # ==========================================
    - name: "Ensure parent directories exist on system"
      ansible.builtin.file:
        path: "{{ item.system_path | replace('~', home_dir) | dirname }}"
        state: directory
        mode: '0755'
      loop: "{{ dotfiles }}"
      loop_control:
        label: "{{ item.name }}"

    # (Carried over from your old appearance.yaml)
    - name: "SPECIAL: Remove populated host theme folders to make way for symlinks"
      ansible.builtin.file:
        path: "{{ item.system_path | replace('~', home_dir) }}"
        state: absent
      loop: "{{ dotfiles }}"
      when: item.type == 'folder' and ('cursors/' in item.system_path or 'icons/' in item.system_path)
      loop_control:
        label: "Demolishing {{ item.name }}"

    # ==========================================
    # PHASE 2: DEPLOYMENT ENGINE
    # ==========================================
    - name: "Deploy FOLDERS (Outward Symlinks)"
      ansible.builtin.file:
        src: "{{ playbook_dir }}/{{ item.repo_path }}"
        dest: "{{ item.system_path | replace('~', home_dir) }}"
        state: link
        force: yes
      loop: "{{ dotfiles }}"
      when: item.type == 'folder'
      loop_control:
        label: "Symlinking folder: {{ item.name }}"

    - name: "Deploy FILES (Hard Copies)"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/{{ item.repo_path }}"
        dest: "{{ item.system_path | replace('~', home_dir) }}"
        mode: preserve
        force: yes
      loop: "{{ dotfiles }}"
      when: item.type == 'file'
      loop_control:
        label: "Copying file: {{ item.name }}"

    # ==========================================
    # PHASE 3: CUSTOM MERGES & REBUILDS
    # ==========================================
    - name: "SPECIAL: Safely merge custom hicolor icons"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/files/userspace/configs/system/appearance/icons/hicolor/"
        dest: "{{ home_dir }}/.local/share/icons/hicolor/"
        mode: preserve
        force: yes
      ignore_errors: true

    - name: "Rebuild KDE Configuration Cache"
      ansible.builtin.command: kbuildsycoca6
      changed_when: false
      ignore_errors: true

    - name: "Rebuild Font Cache"
      ansible.builtin.command: fc-cache -f
      changed_when: false
      ignore_errors: true