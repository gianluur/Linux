# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: workstation
description: "Bazzite base, KDE Desktop, GTK apps, Distrobox utilities"

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: scripts
        destination: /etc/bluebuild/scripts

      - source: distrobox
        destination: /etc/bluebuild/distrobox

      - source: theme
        destination: /etc/bluebuild/theme


  - type: systemd
    user:
      enabled:
        - setup-userspace.service

  - type: gschema-overrides

  - type: dnf
    repos:
      files:
        add:
          - https://download.opensuse.org/repositories/home:paulmcauley/Fedora_44/home:paulmcauley.repo
          - https://download.opensuse.org/repositories/home:luisbocanegra/Fedora_44/home:luisbocanegra.repo
      copr:
        enable:
          - infinality/kwin-effects-better-blur-dx
          - atim/starship
          - lionheartp/Hyprland

    install:
      packages:
        - kvantum
        - kitty
        - nwg-look
        - adw-gtk3-theme 
        - nautilus
        - gnome-disks
        - zsh
        - wl-clipboard
        - kde-connect
        - sbsigntools
        - klassy
        - kwin-effects-better-blur-dx
        - kwin-effects-better-blur-dx-x11
        - distrobox
        - starship
        - python3-pip
        - plasma-panel-colorizer

    remove:
      packages:
        - kde-gtk-config
        - konsole
        - kwrite
        - kate
        - filelight

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: true
        install:
          - app.zen_browser.zen
          - it.mijorus.gearlever
          - com.github.tchx84.Flatseal
          - org.gnome.font-viewer
          - org.onlyoffice.desktopeditors
          - com.obsproject.Studio
          - org.gnome.Papers
          - org.gnome.Loupe
          - org.videolan.VLC
          - org.freedesktop.Piper
          - org.fedoraproject.MediaWriter
          - io.missioncenter.MissionCenter
          - md.obsidian.Obsidian
          - org.localsend.localsend_app
          - dev.vencord.Vesktop
          - com.vscodium.codium
          - com.ranfdev.DistroShelf
          - org.gnome.FileRoller

  - type: fonts
    fonts:
      nerd-fonts:               
        - JetBrainsMono
      google-fonts:              
        - Inter