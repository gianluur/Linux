# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: workstation
description: "Bazzite base, KDE Desktop, GTK apps, Distrobox utilities"

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: scripts
        destination: /etc/bluebuild/scripts

      - source: distrobox
        destination: /etc/bluebuild/distrobox

      - source: theme
        destination: /etc/bluebuild/theme

      - source: userspace
        destination: /etc/bluebuild/userspace

      - source: autostart/setup-userspace.desktop
        destination: /etc/xdg/autostart/setup-userspace.desktop

  - type: dnf
    repos:
      files:
        add:
          - https://download.opensuse.org/repositories/home:paulmcauley/Fedora_44/home:paulmcauley.repo
          - https://download.opensuse.org/repositories/home:luisbocanegra/Fedora_44/home:luisbocanegra.repo
      copr:
        enable:
          - infinality/kwin-effects-better-blur-dx
          - atim/starship
          - lionheartp/Hyprland

    install:
      packages:
        - ansible
        - kvantum
        - kitty
        - nwg-look
        - adw-gtk3-theme 
        - kde-partitionmanager 
        - zsh
        - wl-clipboard
        - kde-connect
        - sbsigntools
        - klassy
        - kwin-effects-better-blur-dx
        - kwin-effects-better-blur-dx-x11
        - distrobox
        - starship
        - python3-pip
        - plasma-panel-colorizer
        - plasma-discover

    remove:
      packages:
        - kde-gtk-config
        - konsole
        - kwrite
        - kate
        - filelight
        - krfb
        - krdc

  - type: default-flatpaks
    configurations:
      - scope: user
        notify: true
        install:
          # Desktop Essentials
          - app.zen_browser.zen # Browser
          - org.kde.kcalc # Calculator
          - org.onlyoffice.desktopeditors # Office Suite
          - com.obsproject.Studio # Video Recording
          - org.kde.okular # PDF Reader
          - org.kde.gwenview # Image Viewer
          - org.videolan.VLC # Audio & Video Player
          - md.obsidian.Obsidian # Notes
          - org.localsend.localsend_app # File Sharing
          - dev.vencord.Vesktop # Discord
          - com.vscodium.codium # Editor

          # Comptaibility
          - it.mijorus.gearlever # AppImage handling
          - com.ranfdev.DistroShelf # Distrobox handling
          - com.github.tchx84.Flatseal # Flatpak permissions
          - org.fedoraproject.MediaWriter # ISO Burner
          - org.freedesktop.Piper # Logitech 

  - type: fonts
    fonts:
      nerd-fonts:               
        - JetBrainsMono
      google-fonts:              
        - Inter