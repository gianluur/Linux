# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: workstation
description: "Base: Bazzite | Desktop: KDE | Purpose: Dev, Office, Gaming"

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: gschema-overrides
    include:
      - zz1-window-buttons.gschema.override

  - type: dnf
    repos:
      files:
        add:
          - https://download.opensuse.org/repositories/home:paulmcauley/Fedora_44/home:paulmcauley.repo
          - https://download.opensuse.org/repositories/home:luisbocanegra/Fedora_44/home:luisbocanegra.repo
          - protonvpn.repo
      copr:
        enable:
          - infinality/kwin-effects-better-blur-dx
          - atim/starship
          - lionheartp/Hyprland
          - lihaohong/yazi
          - jdxcode/mise

    install:
      packages:
        # Utilities
        - yazi
        - eza
        - zoxide
        - bat
        - ripgrep
        - fd-find
        - fzf
        - tldr
        - btop
        - gh
        - jq
        - yq
        - unzip
        - wget
        - curl
        - git
        - kitty
        - zsh
        - starship
        - distrobox
        - mise

        # The reason VSCode is here instead of the flatpak app section
        # is because a flatpak doesn't have system access,
        # since i want to have only one tool for modifying every file
        # i need to have vscode to have full system access to modify stuff like
        # /etc or similar locations
        - code

        # Virtual Machines
        - qemu-kvm
        - libvirt
        - virt-install
        - virt-manager
        - edk2-ovmf
        - swtpm
        - qemu-img

        # System
        - sbsigntools
        - wl-clipboard

        # KDE Stuff
        - kvantum
        - nwg-look
        - kde-partitionmanager
        - kde-connect
        - klassy
        - kwin-effects-better-blur-dx
        - kwin-effects-better-blur-dx-x11
        - plasma-panel-colorizer

    remove:
      packages:
        #KDE Debloating
        - kde-gtk-config
        - konsole
        - kwrite
        - kate
        - filelight
        - krfb
        - krdc

        # Bazzite Debloating
        - waydroid
        - cage
        - wlr-randr
        - lato-fonts
        - fira-code-fonts
        - nerd-fonts
        - plasma-oxygen
        - oxygen-icon-theme
        - gnome-disk-utility
        - stress-ng
        - powerbuttond
        - sdgyrodsu
        - duf
        - gum
        - jupiter-fan-control
        - jupiter-hw-support-btrfs
        - jupiter-sd-mounting-btrfs
        - steamdeck-dsp
        - steamdeck-kde-presets-desktop
        - galileo-mura
        - vpower
        - steamos-manager-powerstation
        - steamos-manager-powerstation-gamescope-session-plus
        - steam-notif-daemon
        - inputplumber
        - gamescope-session-ogui-steam
        - ds-inhibit2
        - khelpcenter

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono
      google-fonts:
        - Inter

  - type: script
    scripts:
      - setup_shell.sh
    snippets:
      - chmod +x /etc/bluebuild/setup-userspace.sh
      - dnf install -y --setopt=tsflags=noscripts proton-vpn-gnome-desktop

      # === VM ===
      # TPM directory for windows machines
      - mkdir -p /var/lib/swtpm-localca
      - chown tss:tss /var/lib/swtpm-localca

      # SELinux fixes
      - restorecon -Rv /var/lib/libvirt /var/log/libvirt /var/lib/swtpm-localca 2>/dev/null || true

  - type: kargs
    kargs:
      - kvm.ignore_msrs=1
      - kvm.report_ignored_msrs=0

  - type: systemd
    system:
      enabled:
        - libvirtd
